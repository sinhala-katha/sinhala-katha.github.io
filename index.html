<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>මගේ කතා පිටුව</title>
    <style>
        body {
            font-family: 'Iskoola Pota', 'Nirmala UI', sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #b71c1c;
        }
        p {
            line-height: 1.8;
            font-size: 18px;
            text-align: justify;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>මගේ පළමු කතාව</h1>
        <p>ඔබගේ කතාව මෙතැනින් ටයිප් කරන්න. ඔබට අවශ්‍ය තරම් දිගට මෙහි කතාව ලිවිය හැක.</p>
        <p>අලුත් ඡේදයක් (Paragraph) අවශ්‍ය නම්, මෙසේ තවත් අලුත් p ටැග් එකක් ඇතුළත ලිවිය හැක.</p>
    </div>
</body>
</html>
